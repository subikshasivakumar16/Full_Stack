<!DOCTYPE html>
<html>
<head>
    <title>KCET Learning - Quiz App</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .quiz-container {
            width: 500px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            color: #333;
        }

        .option {
            display: block;
            margin: 12px 0;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .option:hover {
            background: #dcdcdc;
        }

        button {
            padding: 8px 18px;
            margin: 10px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #5a67d8;
        }

        #result {
            font-size: 18px;
            font-weight: bold;
            color: green;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="quiz-container">
    <h2>KCET Learning Quiz</h2>
    <div id="quiz"></div>

    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>

    <div id="result"></div>
    <button id="restartBtn" style="display:none;">Restart Quiz</button>
</div>

<script src="script.js"></script>

</body>
</html>
