<!DOCTYPE html>
<html ng-app="taskMasterApp">
<head>
    <meta charset="UTF-8">
    <title>TaskMaster - Todo App</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Global Styles */
        body {
            font-family: 'Roboto', sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            padding: 50px 0;
            color: #34495e;
        }

        .container {
            background: #ffffff;
            padding: 35px 30px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
            transition: 0.3s all;
        }

        .container:hover {
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        h1 {
            text-align: center;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        p {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
            color: #7f8c8d;
        }

        /* Filter Buttons */
        .filters {
            text-align: center;
            margin-bottom: 20px;
        }

        .filters button {
            padding: 7px 16px;
            margin: 0 5px;
            border: none;
            border-radius: 50px;
            background: #3498db;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .filters button:hover {
            background: #2980b9;
        }

        /* Todo List */
        ul {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            background: #f9f9f9;
            box-shadow: 0 4px 8px rgba(0,0,0,0.03);
            transition: 0.3s;
        }

        li:hover {
            box-shadow: 0 6px 12px rgba(0,0,0,0.06);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 10px;
        }

        .completed {
            text-decoration: line-through;
            color: #95a5a6;
        }

        /* Delete Button */
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        /* Add New Todo */
        .add-section {
            display: flex;
            justify-content: space-between;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border-radius: 50px;
            border: 1px solid #dcdde1;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #3498db;
            box-shadow: 0 0 8px rgba(52,152,219,0.2);
        }

        .add-btn {
            margin-left: 10px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: #27ae60;
        }
    </style>
</head>

<body ng-controller="TaskController">

<div class="container">
    <h1>TaskMaster</h1>

    <p>{{remaining()}} of {{todos.length}} remaining</p>

    <!-- Filter Buttons -->
    <div class="filters">
        <button ng-click="setFilter('all')">All</button>
        <button ng-click="setFilter('completed')">Completed</button>
        <button ng-click="setFilter('pending')">Pending</button>
    </div>

    <!-- Todo List -->
    <ul>
        <li ng-repeat="todo in todos | filter:statusFilter">
            <div style="display: flex; align-items: center;">
                <input type="checkbox" ng-model="todo.completed">
                <span ng-class="{'completed': todo.completed}">
                    {{todo.text}}
                </span>
            </div>
            <button class="delete-btn" ng-click="deleteTodo($index)">Delete</button>
        </li>
    </ul>

    <!-- Add New Todo -->
    <div class="add-section">
        <input type="text" ng-model="newTodo" placeholder="Add new task here">
        <button class="add-btn" ng-click="addTodo()">Add</button>
    </div>
</div>

<script>
    var app = angular.module("taskMasterApp", []);

    app.controller("TaskController", function($scope) {

        // Initial Tasks
        $scope.todos = [
            { text: "Todo #1", completed: false },
            { text: "Todo #2", completed: false },
            { text: "Todo #3", completed: true },
            { text: "Todo #4", completed: false }
        ];

        // Add New Task
        $scope.addTodo = function() {
            if ($scope.newTodo) {
                $scope.todos.push({
                    text: $scope.newTodo,
                    completed: false
                });
                $scope.newTodo = "";
            }
        };

        // Delete Task
        $scope.deleteTodo = function(index) {
            $scope.todos.splice(index, 1);
        };

        // Count Remaining Tasks
        $scope.remaining = function() {
            var count = 0;
            angular.forEach($scope.todos, function(todo) {
                if (!todo.completed) count++;
            });
            return count;
        };

        // Filter Logic
        $scope.setFilter = function(type) {
            if (type === 'completed') {
                $scope.statusFilter = { completed: true };
            } else if (type === 'pending') {
                $scope.statusFilter = { completed: false };
            } else {
                $scope.statusFilter = {};
            }
        };

    });
</script>

</body>
</html>
